<body>
  <main class="shell">
    <div class="topbar">
      <a class="crumb" href="../index.html">← 返回语言选择</a>
      <nav class="lang-links" aria-label="语言切换">
        <a class="active" href="./privacy.html">简体中文</a>
        <a href="../zh-Hant/privacy.html">繁體中文</a>
        <a href="../en/privacy.html">English</a>
      </nav>
    </div>

    <section class="hero">
      <div class="brand">象</div>
      <h1>隐私政策</h1>
      <p>更新日期：2026-04-05</p>
    </section>

    <section class="grid">
      <article class="panel stack">
        <h2 class="section-title">我们收集的信息</h2>
        <p class="copy">离线象棋不要求注册登录，也不会主动收集姓名、手机号、邮箱、位置、通讯录等个人信息。</p>
      </article>

      <article class="panel stack">
        <h2 class="section-title">数据使用方式</h2>
        <p class="copy">应用主要在设备本地运行。对局进度和设置仅保存在你的设备本地，用于恢复对局和优化使用体验。</p>
      </article>

      <article class="panel stack">
        <h2 class="section-title">第三方共享</h2>
        <p class="copy">我们不会向第三方出售、出租或共享你的个人信息。</p>
      </article>

      <article class="panel stack">
        <h2 class="section-title">联系我们</h2>
        <p class="copy">如有隐私相关问题，可以通过 GitHub Issues 联系我们：</p>
        <div class="actions">
          <a class="button primary" href="https://github.com/AaronYu2017/offline-xiangqi-support/issues">GitHub Issues</a>
        </div>
      </article>
    </section>
  </main>
