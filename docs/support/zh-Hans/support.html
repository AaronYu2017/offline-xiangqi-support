  <title>离线象棋 - 支持</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <nav class="lang-links" aria-label="语言切换">
        <a class="active" href="./support.html">简体中文</a>
        <a href="../zh-Hant/support.html">繁體中文</a>
        <a href="../en/support.html">English</a>
      </nav>
    </div>

    <section class="hero">
      <div class="brand">象</div>
      <h1>离线象棋支持</h1>
      <p>离线象棋是一款专注于纯粹对弈体验的中国象棋应用。无需联网，无需注册，在飞行模式下也可以直接开始对局。</p>
    </section>

    <section class="grid">
      <article class="panel stack">
        <h2 class="section-title">支持方式</h2>
        <p class="copy">如果你遇到问题，或希望提交建议，可以通过以下方式联系我们：</p>
        <div class="actions">
          <a class="button primary" href="https://github.com/AaronYu2017/offline-xiangqi-support/issues">GitHub Issues</a>
          <a class="button" href="./privacy.html">查看隐私政策</a>
        </div>
      </article>

      <article class="panel stack">
        <h2 class="section-title">常见问题</h2>
        <ul>
          <li>可以在没有网络时使用吗？可以。本应用支持离线使用，也支持飞行模式。</li>
          <li>支持哪些模式？支持双人同屏对战，以及与 AI 对战。</li>
          <li>支持哪些设备？支持 iPhone 和 iPad。</li>
          <li>支持哪些语言？当前支持简体中文、繁體中文和 English。</li>
        </ul>
      </article>
    </section>
  </main>
