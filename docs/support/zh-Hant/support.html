    <section class="hero">
      <div class="brand">象</div>
      <h1>離線象棋支援</h1>
      <p>離線象棋是一款專注於純粹對弈體驗的中國象棋應用。無需連網，無需註冊，在飛航模式下也可以直接開始對局。</p>
    </section>

    <section class="grid">
      <article class="panel stack">
        <h2 class="section-title">支援方式</h2>
        <p class="copy">如果你遇到問題，或希望提出建議，可以透過以下方式聯絡我們：</p>
        <div class="actions">
          <a class="button primary" href="https://github.com/AaronYu2017/offline-xiangqi-support/issues">GitHub Issues</a>
          <a class="button" href="./privacy.html">查看隱私政策</a>
        </div>
      </article>

      <article class="panel stack">
        <h2 class="section-title">常見問題</h2>
        <ul>
          <li>可以在沒有網路時使用嗎？可以。本應用支援離線使用，也支援飛航模式。</li>
          <li>支援哪些模式？支援雙人同屏對戰，以及與 AI 對戰。</li>
          <li>支援哪些裝置？支援 iPhone 和 iPad。</li>
          <li>支援哪些語言？目前支援簡體中文、繁體中文和 English。</li>
        </ul>
      </article>
