<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>離線象棋 - 隱私政策</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <nav class="lang-links" aria-label="語言切換">
        <a href="../zh-Hans/privacy.html">简体中文</a>
        <a class="active" href="./privacy.html">繁體中文</a>
        <a href="../en/privacy.html">English</a>
      </nav>
    </div>

    <section class="hero">
      <div class="brand">象</div>
      <h1>隱私政策</h1>
      <p>更新日期：2026-04-05</p>
    </section>

    <section class="grid">
      <article class="panel stack">
        <h2 class="section-title">我們收集的資訊</h2>
        <p class="copy">離線象棋不要求註冊登入，也不會主動收集姓名、手機號碼、電子郵件、位置、通訊錄等個人資訊。</p>
      </article>

      <article class="panel stack">
        <h2 class="section-title">資料使用方式</h2>
        <p class="copy">應用主要在裝置本地運行。對局進度與設定僅保存在你的裝置本地，用於恢復對局和優化使用體驗。</p>
      </article>

      <article class="panel stack">
        <h2 class="section-title">第三方共享</h2>
        <p class="copy">我們不會向第三方出售、出租或共享你的個人資訊。</p>
      </article>

      <article class="panel stack">
        <h2 class="section-title">聯絡我們</h2>
        <p class="copy">如有隱私相關問題，可以透過 GitHub Issues 聯絡我們：</p>
        <div class="actions">
          <a class="button primary" href="https://github.com/AaronYu2017/offline-xiangqi-support/issues">GitHub Issues</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
